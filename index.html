const VERDICT_ORDER = {"Strong buy":0,"Watch":1,"Growth play":2,"Pass":3};
const STATUS_ORDER  = {"Buy now":0,"Getting close":1,"Wait for dip":2,"Avoid":3};

function scoreDots(n) {
  const f = Math.round((n||0)/2);
  return '<span class="dots">' + '●'.repeat(f) + '○'.repeat(5-f) + '</span>';
}
function verdictPill(v) {
  const cls = {
    "Strong buy":"pill-sb","Watch":"pill-w","Growth play":"pill-gp","Pass":"pill-pass"
  }[v] || "pill-pass";
  return `<span class="pill ${cls}">${v}</span>`;
}
function statusBadge(s) {
  const cls = {
    "Buy now":"badge-green","Getting close":"badge-yellow",
    "Wait for dip":"badge-grey","Avoid":"badge-red","MACC risk":"badge-red"
  }[s] || "badge-grey";
  return `<span class="badge ${cls}">${s}</span>`;
}
function moatLabel(m) {
  return {"Wide":"W 🏰","Narrow":"N","Weak":"~","None":"—"}[m] || m;
}

let activeFilter = "All";
const FILTERS = ["All","Strong buy","Watch","Growth play","Pass","Buy now","Getting close"];

function buildSummary() {
  const counts = {};
  DATA.forEach(d => {
    counts[d.verdict] = (counts[d.verdict]||0)+1;
  });
  const buyNow = DATA.filter(d => d.status==="Buy now").length;
  const map = [
    ["Strong buy", "pill-sb"], ["Watch","pill-w"],
    ["Growth play","pill-gp"], ["Pass","pill-pass"]
  ];
  document.getElementById("summary").innerHTML =
    map.map(([v,c]) => `<span class="${c}">${counts[v]||0} ${v}</span>`).join("") +
    `<span class="badge-green badge" style="margin-left:8px">${buyNow} Buy Now</span>`;
}

function buildFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = FILTERS.map(f =>
    `<button class="${f===activeFilter?'active':''}" onclick="setFilter('${f}')">${f}</button>`
  ).join("");
}

function setFilter(f) {
  activeFilter = f;
  buildFilters();
  renderTable();
}

let expandedIdx = null;
function renderTable() {
  const tbody = document.getElementById("tbody");
  const filterStatus = ["Buy now","Getting close"].includes(activeFilter);
  const visible = DATA.filter(d => {
    if (activeFilter === "All") return true;
    if (filterStatus) return d.status === activeFilter;
    return d.verdict === activeFilter;
  });

  let html = "";
  let lastVerdict = null;
  let rankWithinGroup = 0;

  visible.forEach((d, i) => {
    if (d.verdict !== lastVerdict) {
      lastVerdict = d.verdict;
      rankWithinGroup = 0;
      const icons = {"Strong buy":"⭐","Watch":"👁","Growth play":"🚀","Pass":"✗"};
      const garpNote = d.verdict==="Growth play" ? " · GARP" : "";
      html += `<tr class="section-header"><td colspan="10">${icons[d.verdict]||""} ${d.verdict.toUpperCase()}${garpNote}</td></tr>`;
    }
    rankWithinGroup++;
    const isExp = expandedIdx === i;
    html += `<tr data-i="${i}" class="${isExp?'expanded':''}" onclick="toggle(${i})">
      <td class="num">${rankWithinGroup}</td>
      <td class="name-cell"><a href="${d.gf_url}" target="_blank" onclick="event.stopPropagation()">${d.name}</a>
        <div class="ticker-cell">${d.ticker}</div></td>
      <td class="num">${d.price}</td>
      <td class="num">${d.pe}</td>
      <td class="num">${d.div}</td>
      <td>${moatLabel(d.moat)}</td>
      <td>${scoreDots(d.score)} ${d.score}</td>
      <td>${verdictPill(d.verdict)}</td>
      <td>${statusBadge(d.status)}</td>
      <td class="mono" style="font-size:12px">${d.buy_zone}</td>
    </tr>`;
    if (isExp) {
      html += `<tr class="detail-row"><td colspan="10"><div class="detail-panel">
        ${d.one_line ? `<div class="thesis">💡 ${d.one_line}</div>` : ""}
        ${d.key_risk ? `<div class="risk">⚠️ Risk: ${d.key_risk}</div>` : ""}
        ${d.quote    ? `<div class="quote">"${d.quote}"</div>` : ""}
      </div></td></tr>`;
    }
  });

  tbody.innerHTML = html || `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--muted)">No stocks match this filter.</td></tr>`;
}

function toggle(i) {
  expandedIdx = (expandedIdx === i) ? null : i;
  renderTable();
}

buildSummary();
buildFilters();
renderTable();
</script>
